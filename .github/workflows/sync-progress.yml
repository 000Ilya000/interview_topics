name: Sync progress to README

on:
  issues:
    types: [opened, edited, deleted, closed, reopened, labeled, unlabeled]
  workflow_dispatch:
  schedule:
    # запасной синк каждый час (если webhook не сработал)
    - cron: "0 * * * *"

permissions:
  contents: write
  issues: write

concurrency:
  group: sync-progress
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update README progress block
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/sync-progress.mjs

      - name: Commit and push README if changed
        run: |
          if git diff --quiet README.md; then
            echo "README unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: sync course progress from Issue"
          git push
